name = "sky-ai-api"
main = "workers/api/src/worker.ts"
compatibility_date = "2026-03-05"
workers_dev = true

[vars]
ENVIRONMENT = "dev"
ACCESS_AUTH_ENABLED = "true"
ALLOW_API_KEY_BYPASS = "false"
AIG_ACCOUNT_ID = "fa3dc6c06433f6b0ea78d95bce23ad91"
AIG_GATEWAY_ID = "sky-ai"
OPENAI_EMBEDDING_MODEL = "text-embedding-3-small"
OPENAI_MODEL = "gpt-4o-mini"
WORKERS_AI_EMBEDDING_MODEL = "@cf/baai/bge-base-en-v1.5"
WORKERS_AI_CHAT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
VECTOR_DIMENSIONS = "1536"

[[d1_databases]]
binding = "SKY_DB"
database_name = "sky-ai-dev"
database_id = "4d6853be-e6da-45df-b054-afd2207413e6"
migrations_dir = "db/migrations"

[[vectorize]]
binding = "SKY_VECTORIZE"
index_name = "sky-ai-memory-dev"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "CHAT_COORDINATOR"
class_name = "ChatCoordinator"

[[migrations]]
tag = "v1"
new_classes = ["ChatCoordinator"]

[env.prod]
workers_dev = true

[env.prod.vars]
ENVIRONMENT = "prod"
ACCESS_AUTH_ENABLED = "true"
ALLOW_API_KEY_BYPASS = "false"
AIG_ACCOUNT_ID = "fa3dc6c06433f6b0ea78d95bce23ad91"
AIG_GATEWAY_ID = "sky-ai"
OPENAI_EMBEDDING_MODEL = "text-embedding-3-small"
OPENAI_MODEL = "gpt-4o-mini"
WORKERS_AI_EMBEDDING_MODEL = "@cf/baai/bge-base-en-v1.5"
WORKERS_AI_CHAT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
VECTOR_DIMENSIONS = "1536"

[[env.prod.d1_databases]]
binding = "SKY_DB"
database_name = "sky-ai-prod"
database_id = "e0dc4ec1-26d5-46db-819d-a416bb76c7ec"
migrations_dir = "db/migrations"

[[env.prod.vectorize]]
binding = "SKY_VECTORIZE"
index_name = "sky-ai-memory-prod"

[env.prod.ai]
binding = "AI"

[[env.prod.durable_objects.bindings]]
name = "CHAT_COORDINATOR"
class_name = "ChatCoordinator"
