name = "sky-ai"
main = "src/worker.ts"
compatibility_date = "2026-03-05"
workers_dev = true

[vars]
ENVIRONMENT = "dev"
AIG_ACCOUNT_ID = "fa3dc6c06433f6b0ea78d95bce23ad91"
AIG_GATEWAY_ID = "sky-ai"
OPENAI_MODEL = "gpt-4o-mini"

[[d1_databases]]
binding = "SKY_DB"
database_name = "sky-ai-dev"
database_id = "4d6853be-e6da-45df-b054-afd2207413e6"
migrations_dir = "db/migrations"

[[r2_buckets]]
binding = "SKY_ARTIFACTS"
bucket_name = "sky-ai-artifacts-dev"

[[vectorize]]
binding = "SKY_VECTORIZE"
index_name = "sky-ai-memory-dev"

[triggers]
crons = ["*/15 * * * *", "0 13 * * *"]

[observability]
enabled = true

[env.prod]
workers_dev = false
route = { pattern = "sky-ai-api.example.com/*", zone_name = "example.com" }

[env.prod.vars]
ENVIRONMENT = "prod"
AIG_ACCOUNT_ID = "fa3dc6c06433f6b0ea78d95bce23ad91"
AIG_GATEWAY_ID = "sky-ai"
OPENAI_MODEL = "gpt-4o-mini"

[[env.prod.d1_databases]]
binding = "SKY_DB"
database_name = "sky-ai-prod"
database_id = "e0dc4ec1-26d5-46db-819d-a416bb76c7ec"
migrations_dir = "db/migrations"

[[env.prod.r2_buckets]]
binding = "SKY_ARTIFACTS"
bucket_name = "sky-ai-artifacts-prod"

[[env.prod.vectorize]]
binding = "SKY_VECTORIZE"
index_name = "sky-ai-memory-prod"

[env.prod.triggers]
crons = ["*/15 * * * *", "0 13 * * *"]
