name = "sky-ai-jobs"
main = "workers/jobs/src/worker.ts"
compatibility_date = "2026-03-05"
workers_dev = true

[vars]
ENVIRONMENT = "dev"
AIG_ACCOUNT_ID = "fa3dc6c06433f6b0ea78d95bce23ad91"
AIG_GATEWAY_ID = "sky-ai"
OPENAI_MODEL = "gpt-4o-mini"
OPENAI_EMBEDDING_MODEL = "text-embedding-3-small"
WORKERS_AI_EMBEDDING_MODEL = "@cf/baai/bge-base-en-v1.5"
VECTOR_DIMENSIONS = "1536"
ACCESS_AUTH_ENABLED = "true"
ALLOW_API_KEY_BYPASS = "true"

[[d1_databases]]
binding = "SKY_DB"
database_name = "sky-ai-dev"
database_id = "4d6853be-e6da-45df-b054-afd2207413e6"
migrations_dir = "db/migrations"

[[vectorize]]
binding = "SKY_VECTORIZE"
index_name = "sky-ai-memory-dev"

[ai]
binding = "AI"

[[queues.consumers]]
queue = "sky-ai-embeddings-dev"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5

[triggers]
crons = ["*/15 * * * *", "0 * * * *"]

[env.prod]
workers_dev = false
route = { pattern = "sky-ai-jobs.example.com/*", zone_name = "example.com" }

[env.prod.vars]
ENVIRONMENT = "prod"
AIG_ACCOUNT_ID = "fa3dc6c06433f6b0ea78d95bce23ad91"
AIG_GATEWAY_ID = "sky-ai"
OPENAI_MODEL = "gpt-4o-mini"
OPENAI_EMBEDDING_MODEL = "text-embedding-3-small"
WORKERS_AI_EMBEDDING_MODEL = "@cf/baai/bge-base-en-v1.5"
VECTOR_DIMENSIONS = "1536"
ACCESS_AUTH_ENABLED = "true"
ALLOW_API_KEY_BYPASS = "true"

[[env.prod.d1_databases]]
binding = "SKY_DB"
database_name = "sky-ai-prod"
database_id = "e0dc4ec1-26d5-46db-819d-a416bb76c7ec"
migrations_dir = "db/migrations"

[[env.prod.vectorize]]
binding = "SKY_VECTORIZE"
index_name = "sky-ai-memory-prod"

[env.prod.ai]
binding = "AI"

[[env.prod.queues.consumers]]
queue = "sky-ai-embeddings-prod"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5

[env.prod.triggers]
crons = ["*/15 * * * *", "0 * * * *"]
